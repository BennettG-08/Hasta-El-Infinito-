<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Hasta el Infinito ♾️❤️</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Fondo de estrellas -->
    <div class="stars"></div>

    <!-- Pétalos -->
    <div id="petals"></div>

    <!-- Corazones -->
    <div id="hearts"></div>

    <!-- Contenido -->
    <div class="container">

        <h1>Hasta el Infinito ♾️</h1>

        <p>
            Hay personas que llegan a tu vida para cambiarlo todo.
            Tú llegaste para convertir mis días en los más bonitos de mi universo.
        </p>

        <button id="openLetter">
            Abrir mi carta ❤️
        </button>

    </div>

    <!-- Música -->
    <audio id="bgMusic" loop>
        <source src="Indila - Love Story (Versión para piano) - (320 Kbps) (1).mp3" type="audio/mpeg">
        Tu navegador no soporta audio.
    </audio>

    <!-- JavaScript -->
    <script src="script.js"></script>

</body>

</html>
